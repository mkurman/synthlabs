services:
  cockroachdb:
    image: cockroachdb/cockroach:latest-v24.1
    command: start-single-node --insecure --store=attrs=ssd,path=/cockroach/cockroach-data
    ports:
      - "26257:26257"
      - "8080:8080"
    volumes:
      - cockroach-data:/cockroach/cockroach-data
    environment:
      - COCKROACH_DATABASE=synthlabs

  init:
    image: cockroachdb/cockroach:latest-v24.1
    entrypoint: /bin/bash
    command: >
      -c "
      sleep 5 &&
      cockroach sql --insecure --host=cockroachdb:26257 --execute='CREATE DATABASE IF NOT EXISTS synthlabs;'
      "
    depends_on:
      - cockroachdb

  backend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "8900:8900"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - PORT=8900
      # These are defaults for the local CockroachDB container.
      # The UI's "Switch Provider" persists its own config to .backend-config.json,
      # which takes priority over these env vars on subsequent restarts.
      - DB_PROVIDER=cockroachdb
      - COCKROACH_CONNECTION_STRING=postgresql://root@cockroachdb:26257/synthlabs?sslmode=disable
    volumes:
      - ..:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "corepack enable pnpm && pnpm install --frozen-lockfile && node server/index.js"
    depends_on:
      - cockroachdb

  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "3000:5173"
    env_file:
      - ../.env
    environment:
      - VITE_BACKEND_URL=http://localhost:8900
    volumes:
      - ..:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "corepack enable pnpm && pnpm install --frozen-lockfile && pnpm dev:client"
    depends_on:
      - backend

volumes:
  cockroach-data:
  backend_node_modules:
  frontend_node_modules:
